<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Pitland - Karta zákazníka</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eee;
    --text2: #aab;
    --success: #2ecc71;
    --warn: #f39c12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }
  header {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    padding: 16px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 20px; font-weight: 700; }
  header p { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }

  .container { max-width: 600px; margin: 0 auto; padding: 16px; }

  /* Settings panel */
  .settings-toggle {
    position: absolute;
    top: 14px;
    right: 16px;
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
  }
  .settings-panel {
    display: none;
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .settings-panel.open { display: block; }
  .settings-panel label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; margin-top: 12px; }
  .settings-panel input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #333;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  .settings-panel .save-btn {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    background: var(--success);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .settings-panel h3 { font-size: 16px; }

  /* Camera section */
  .camera-section {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin-bottom: 16px;
  }
  .camera-section h2 { font-size: 18px; margin-bottom: 16px; }
  .camera-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 32px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .camera-btn:active { transform: scale(0.96); }
  .camera-btn svg { width: 24px; height: 24px; }
  #fileInput { display: none; }

  /* Preview */
  .preview-section {
    display: none;
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .preview-section.visible { display: block; }
  .preview-img {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .preview-actions { display: flex; gap: 8px; }
  .preview-actions button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-analyze { background: var(--accent); color: white; }
  .btn-retake { background: #333; color: var(--text2); }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 40px;
  }
  .loading.visible { display: block; }
  .spinner {
    width: 48px;
    height: 48px;
    border: 4px solid #333;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results-section {
    display: none;
    margin-bottom: 16px;
  }
  .results-section.visible { display: block; }
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .results-header h2 { font-size: 18px; }
  .shared-fields {
    background: var(--accent2);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .shared-fields h3 { font-size: 14px; color: var(--text2); margin-bottom: 8px; }
  .field-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .field-row .field { flex: 1; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input, .field select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #333;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  .customer-card {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    border-left: 4px solid var(--accent);
  }
  .customer-card h3 {
    font-size: 15px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .customer-card .remove-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 20px;
    cursor: pointer;
    padding: 0 4px;
  }
  .field textarea {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #333;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    resize: vertical;
    min-height: 50px;
  }

  /* Submit */
  .submit-section {
    display: none;
  }
  .submit-section.visible { display: block; }
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--success);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .submit-btn:active { transform: scale(0.96); }
  .submit-btn:disabled { background: #555; cursor: not-allowed; }

  /* Status messages */
  .status-msg {
    display: none;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 16px;
    text-align: center;
    font-weight: 600;
  }
  .status-msg.visible { display: block; }
  .status-msg.success { background: rgba(46,204,113,0.2); color: var(--success); }
  .status-msg.error { background: rgba(233,69,96,0.2); color: var(--accent); }

  /* Add customer button */
  .add-customer-btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 2px dashed #444;
    border-radius: 12px;
    color: var(--text2);
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 12px;
  }

  /* Responsive */
  @media (max-width: 400px) {
    .field-row { flex-direction: column; gap: 4px; }
  }
</style>
</head>
<body>

<header>
  <h1>Pitland - Karta z&aacute;kazn&iacute;ka</h1>
  <p>Vyfo&tcaron; kartu &rarr; zkontroluj &rarr; ulo&zcaron; do tabulky</p>
  <button class="settings-toggle" onclick="toggleSettings()">&#9881;</button>
</header>

<div class="container">

  <!-- Settings -->
  <div class="settings-panel" id="settingsPanel">
    <h3>&#9881; Nastaven&iacute;</h3>
    <label>Gemini API kl&iacute;&ccaron; (z ai.google.dev)</label>
    <input type="password" id="geminiKey" placeholder="AIza...">
    <label>Google Apps Script URL (webhook)</label>
    <input type="url" id="webhookUrl" placeholder="https://script.google.com/macros/s/...">
    <button class="save-btn" onclick="saveSettings()">Ulo&zcaron;it nastaven&iacute;</button>
  </div>

  <!-- Camera -->
  <div class="camera-section" id="cameraSection">
    <h2>&#128247; Vyfo&tcaron; kartu z&aacute;kazn&iacute;ka</h2>
    <button class="camera-btn" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Vyfotit / Nahr&aacute;t
    </button>
    <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="handleFile(event)">
  </div>

  <!-- Preview -->
  <div class="preview-section" id="previewSection">
    <img class="preview-img" id="previewImg">
    <div class="preview-actions">
      <button class="btn-retake" onclick="retake()">&#8635; Znovu</button>
      <button class="btn-analyze" onclick="analyzeImage()">&#9889; Rozpoznat text</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>AI &ccaron;te kartu z&aacute;kazn&iacute;ka...</p>
    <p style="font-size:12px;color:var(--text2);margin-top:8px">Rozpozn&aacute;v&aacute;m ru&ccaron;n&iacute; p&iacute;smo pomoc&iacute; Gemini</p>
  </div>

  <!-- Status -->
  <div class="status-msg" id="statusMsg"></div>

  <!-- Results -->
  <div class="results-section" id="resultsSection">
    <div class="results-header">
      <h2>&#9998; Kontrola &uacute;daj&udblac;</h2>
    </div>

    <div class="shared-fields">
      <h3>Spole&ccaron;n&eacute; &uacute;daje (pro v&scaron;echny na kart&ecaron;)</h3>
      <div class="field-row">
        <div class="field">
          <label>Datum</label>
          <input type="text" id="sharedDatum" placeholder="22.3.">
        </div>
        <div class="field">
          <label>SAM</label>
          <input type="text" id="sharedSam" placeholder="Martin B.">
        </div>
        <div class="field">
          <label>Kurz</label>
          <select id="sharedKurz">
            <option value="1 HOD">1 HOD</option>
            <option value="2 HOD">2 HOD</option>
            <option value="PARTIČKA">PARTI&Ccaron;KA</option>
          </select>
        </div>
      </div>
    </div>

    <div id="customersContainer"></div>

    <button class="add-customer-btn" onclick="addEmptyCustomer()">+ P&rcaron;idat z&aacute;kazn&iacute;ka</button>
  </div>

  <!-- Submit -->
  <div class="submit-section" id="submitSection">
    <button class="submit-btn" id="submitBtn" onclick="submitToSheet()">
      &#10004; Zapsat do tabulky
    </button>
  </div>

</div>

<script>
// ============================================================
// STATE
// ============================================================
let currentImageBase64 = null;
let customers = [];

// ============================================================
// SETTINGS
// ============================================================
function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
  document.getElementById('geminiKey').value = localStorage.getItem('geminiKey') || '';
  document.getElementById('webhookUrl').value = localStorage.getItem('webhookUrl') || '';
}

function saveSettings() {
  localStorage.setItem('geminiKey', document.getElementById('geminiKey').value.trim());
  localStorage.setItem('webhookUrl', document.getElementById('webhookUrl').value.trim());
  document.getElementById('settingsPanel').classList.remove('open');
  showStatus('Nastavení uloženo!', 'success');
}

function checkSettings() {
  const key = localStorage.getItem('geminiKey');
  const url = localStorage.getItem('webhookUrl');
  if (!key || !url) {
    toggleSettings();
    showStatus('Nejdříve vyplňte nastavení (API klíč a webhook URL)', 'error');
    return false;
  }
  return true;
}

// ============================================================
// CAMERA / FILE
// ============================================================
function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    currentImageBase64 = e.target.result;
    document.getElementById('previewImg').src = currentImageBase64;
    document.getElementById('previewSection').classList.add('visible');
    document.getElementById('cameraSection').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function retake() {
  currentImageBase64 = null;
  document.getElementById('previewSection').classList.remove('visible');
  document.getElementById('cameraSection').style.display = '';
  document.getElementById('resultsSection').classList.remove('visible');
  document.getElementById('submitSection').classList.remove('visible');
  document.getElementById('fileInput').value = '';
  hideStatus();
}

// ============================================================
// GEMINI AI ANALYSIS
// ============================================================
async function analyzeImage() {
  if (!checkSettings()) return;
  if (!currentImageBase64) return;

  const apiKey = localStorage.getItem('geminiKey');

  // Show loading
  document.getElementById('loading').classList.add('visible');
  document.getElementById('previewSection').classList.remove('visible');
  hideStatus();

  try {
    // Extract base64 data (remove data:image/...;base64, prefix)
    const base64Data = currentImageBase64.split(',')[1];
    const mimeType = currentImageBase64.split(';')[0].split(':')[1];

    const prompt = `Analyzuj tuto fotografii karty zákazníka z motorkářského kurzu Pitland.

Karta má tyto sekce:
- HLAVIČKA: DATUM, SAM (jméno instruktora), typ kurzu (1HOD / 2HOD / PARTIČKA) - zaškrtávací políčka
- Až 4 ZÁKAZNÍCI (v mřížce 2x2): každý má JMÉNO, PŘEZDÍVKA, POPRVÉ/OPAKOVANÁ (zaškrtávací), PROČ PŘIŠEL?, KDE SE O NÁS DOZVĚDĚL?, POTŘEBA

Společné údaje (datum, SAM, kurz) platí pro všechny zákazníky na kartě.
Pokud je u "kde se dozvěděl" značka -//- nebo podobná, znamená to "stejné jako předchozí zákazník" - v tom případě zkopíruj text od předchozího.

Vrať data POUZE jako validní JSON v tomto formátu (žádný jiný text):
{
  "datum": "22.3.",
  "sam": "Martin B.",
  "kurz": "1 HOD",
  "customers": [
    {
      "prezdivka": "NICKNAME nebo jméno pokud přezdívka chybí",
      "poprve": "ano nebo Ne",
      "proc_prisel": "text",
      "kde_se_dozvedel": "text",
      "potreba": "text"
    }
  ]
}

Pravidla:
- Pokud je zaškrtnuto POPRVÉ → "ano", pokud OPAKOVANÁ → "Ne"
- Pokud přezdívka chybí, použij jméno zákazníka
- Pokud je kurz 1HOD zaškrtnut → "1 HOD", 2HOD → "2 HOD"
- U -//- značek zkopíruj skutečný text z předchozího zákazníka
- Zahrň POUZE zákazníky, kteří mají vyplněná pole (ne prázdné sekce)
- Datum piš ve formátu "DD.M." (např. "22.3." nebo "29.2.")
- Vrať POUZE JSON, žádné vysvětlení ani markdown`;

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: prompt },
              {
                inline_data: {
                  mime_type: mimeType,
                  data: base64Data
                }
              }
            ]
          }],
          generationConfig: {
            temperature: 0.1,
            maxOutputTokens: 4096
          }
        })
      }
    );

    if (!response.ok) {
      const errData = await response.json();
      throw new Error(errData.error?.message || `API chyba: ${response.status}`);
    }

    const result = await response.json();
    const text = result.candidates?.[0]?.content?.parts?.[0]?.text || '';

    // Parse JSON from response (handle markdown code blocks)
    let jsonStr = text;
    const jsonMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (jsonMatch) {
      jsonStr = jsonMatch[1].trim();
    }

    const parsed = JSON.parse(jsonStr);

    // Populate UI
    document.getElementById('sharedDatum').value = parsed.datum || '';
    document.getElementById('sharedSam').value = parsed.sam || '';
    document.getElementById('sharedKurz').value = parsed.kurz || '1 HOD';

    customers = parsed.customers || [];
    renderCustomers();

    // Show results
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('resultsSection').classList.add('visible');
    document.getElementById('submitSection').classList.add('visible');

    showStatus(`Rozpoznáno ${customers.length} zákazníků. Zkontrolujte a upravte údaje.`, 'success');

  } catch (error) {
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('previewSection').classList.add('visible');
    showStatus('Chyba při rozpoznávání: ' + error.message, 'error');
    console.error('Analyze error:', error);
  }
}

// ============================================================
// CUSTOMER CARDS UI
// ============================================================
function renderCustomers() {
  const container = document.getElementById('customersContainer');
  container.innerHTML = '';

  customers.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'customer-card';
    card.innerHTML = `
      <h3>
        Zákazník ${i + 1}
        <button class="remove-btn" onclick="removeCustomer(${i})" title="Odebrat">&times;</button>
      </h3>
      <div class="field-row">
        <div class="field">
          <label>Přezdívka / Jméno</label>
          <input type="text" value="${esc(c.prezdivka)}" onchange="customers[${i}].prezdivka=this.value">
        </div>
        <div class="field">
          <label>Poprvé</label>
          <select onchange="customers[${i}].poprve=this.value">
            <option value="ano" ${c.poprve === 'ano' ? 'selected' : ''}>ano</option>
            <option value="Ne" ${c.poprve === 'Ne' ? 'selected' : ''}>Ne</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Proč přišel</label>
        <textarea onchange="customers[${i}].proc_prisel=this.value">${esc(c.proc_prisel)}</textarea>
      </div>
      <div class="field" style="margin-top:6px">
        <label>Kde se dozvěděl</label>
        <input type="text" value="${esc(c.kde_se_dozvedel)}" onchange="customers[${i}].kde_se_dozvedel=this.value">
      </div>
      <div class="field" style="margin-top:6px">
        <label>Komunikovaná potřeba</label>
        <textarea onchange="customers[${i}].potreba=this.value">${esc(c.potreba)}</textarea>
      </div>
    `;
    container.appendChild(card);
  });
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function removeCustomer(i) {
  customers.splice(i, 1);
  renderCustomers();
}

function addEmptyCustomer() {
  customers.push({
    prezdivka: '',
    poprve: 'ano',
    proc_prisel: '',
    kde_se_dozvedel: '',
    potreba: ''
  });
  renderCustomers();
}

// ============================================================
// SUBMIT TO GOOGLE SHEETS
// ============================================================
async function submitToSheet() {
  if (!checkSettings()) return;

  const webhookUrl = localStorage.getItem('webhookUrl');
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Odesílám...';

  const datum = document.getElementById('sharedDatum').value;
  const sam = document.getElementById('sharedSam').value;
  const kurz = document.getElementById('sharedKurz').value;

  // Build payload
  const payload = {
    customers: customers.map(c => ({
      datum: datum,
      sam: sam,
      prezdivka: c.prezdivka || '',
      poprve: c.poprve || 'ano',
      kurz: kurz,
      proc_prisel: c.proc_prisel || '',
      kde_se_dozvedel: c.kde_se_dozvedel || '',
      potreba: c.potreba || '',
      upsale: ''
    }))
  };

  try {
    const response = await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      mode: 'no-cors' // Apps Script requires this
    });

    // With no-cors we can't read the response, but if it didn't throw, it likely worked
    showStatus(`Odesláno ${customers.length} zákazníků do tabulky!`, 'success');

    // Reset after 3 seconds
    setTimeout(() => {
      retake();
      btn.disabled = false;
      btn.textContent = '\u2714 Zapsat do tabulky';
    }, 3000);

  } catch (error) {
    showStatus('Chyba při odesílání: ' + error.message, 'error');
    btn.disabled = false;
    btn.textContent = '\u2714 Zapsat do tabulky';
  }
}

// ============================================================
// STATUS MESSAGES
// ============================================================
function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg visible ' + type;
}

function hideStatus() {
  document.getElementById('statusMsg').className = 'status-msg';
}

// ============================================================
// INIT - check settings on load
// ============================================================
window.addEventListener('load', () => {
  const key = localStorage.getItem('geminiKey');
  const url = localStorage.getItem('webhookUrl');
  if (!key || !url) {
    setTimeout(() => toggleSettings(), 500);
  }
});
</script>
</body>
</html>
